name: 同步 Google Sheets

# 月度薪資結算：手動指定 year / month 後觸發。
# 一次性 bootstrap（schema / employees / meal seed）已完成；
# CI 只跑：回歸測試 → 寫回 Sheets。

on:
  workflow_dispatch:
    inputs:
      year:
        description: '年度（西元）'
        required: true
        type: string
      month:
        description: '月份（1-12）'
        required: true
        type: string
      dry_run:
        description: '僅試算不寫回 Sheets'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python 套件
        run: pip install gspread google-auth

      - name: 還原 service_account.json
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: printf '%s' "$GOOGLE_SERVICE_ACCOUNT" > service_account.json

      - name: 回歸測試（計算引擎 + 沉澱規則）
        run: python verified_cases.py

      - name: 計算薪資並寫回
        run: |
          python main_sync.py \
            --year "${{ inputs.year }}" \
            --month "${{ inputs.month }}" \
            ${{ inputs.dry_run == true && '--dry-run' || '' }}
